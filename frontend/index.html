<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gate" class="gate">
    <form id="gate-form" class="gate-form">
      <h1>Claude Chat</h1>
      <p class="subtitle">Enter the access code you were given to use this app.</p>
      <input
        id="gate-input"
        type="password"
        placeholder="Access code"
        autocomplete="off"
        required
      />
      <button type="submit">Unlock</button>
      <p id="gate-error" class="gate-error" hidden></p>
    </form>
  </div>

  <main class="chat" id="chat" hidden>
    <header class="chat-header">
      <h1>Claude Chat</h1>
      <p class="subtitle">Calculator + web search tools.</p>
    </header>

    <div id="messages" class="messages" aria-live="polite"></div>

    <form id="composer" class="composer">
      <input
        id="input"
        type="text"
        placeholder="Ask something…"
        autocomplete="off"
        maxlength="8000"
        required
      />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </main>

  <!--
    Point this at your deployed backend before hosting the frontend
    somewhere separate from it (Netlify, GitHub Pages, etc). Defaults to
    localhost for local dev.
  -->
  <script>
    window.API_BASE = window.API_BASE || "http://localhost:8000";
  </script>
  <script src="app.js"></script>
</body>
</html>
